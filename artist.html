function renderDetail(a, sc) {
  const cl = clusterLabel(sc.total);
  const avColors = {bluechip:'av-gold',italiani:'av-blue',emergenti:'av-green'};
  const avCls = avColors[a.category]||'av-gray';
  const avLetter = a.avatar.replace('2','');

  const allScores = [
    {label:'Musei e istituzioni', pts:sc.museumPts},
    {label:'Gallerie commerciali', pts:sc.galleryPts},
    {label:'Premi e fiere', pts:sc.prizePts+sc.fairPts},
    {label:'Qualità documentale', pts:sc.docPts},
    {label:'Attività espositiva', pts:sc.expoPts},
    {label:'Mercato aste', pts:sc.mktPts},
    {label:'Web reputation', pts:sc.webPts},
  ].filter(s=>s.pts!==0);
  const maxPts = Math.max(...allScores.map(s=>Math.abs(s.pts)),1);

  const barsHtml = allScores.map(s=>{
    const pct = Math.min(100,Math.abs(s.pts)/maxPts*100).toFixed(1);
    const neg = s.pts<0;
    return `<div>
      <div class="sb-head">
        <span class="sb-lbl">${s.label}</span>
        <span class="sb-pts ${neg?'sb-neg':'sb-pos'}">${neg?'−':'+'}${fmtPts(Math.abs(s.pts))}</span>
      </div>
      <div class="sb-track"><div class="${neg?'sb-fill-neg':'sb-fill'}" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');

  function tierList(arr, tier) {
    if(!arr||!arr.length) return '<span style="font-size:12px;color:var(--textm)">Nessuna</span>';
    return arr.map(n=>`<div class="tier-item"><span class="tier-name">${n}</span><span class="tier-badge ${tier.toLowerCase()}">Tier ${tier}</span></div>`).join('');
  }

  function badgeSi(v){ const s=String(v||'').toLowerCase(); return s==='si'||s==='sì'?'<span class="badge-yes">✓ Sì</span>':'<span class="badge-no">✗ No</span>'; }
  function curLabel(v){ if(v==='intl')return'<span class="badge-yes">✓ Internazionale</span>'; if(v==='naz')return'<span class="badge-yes">✓ Nazionale</span>'; return'<span class="badge-no">✗ No</span>'; }

  document.getElementById('artist-detail').innerHTML = `

    <div class="detail-hero">
      <div class="detail-av ${avCls}">${avLetter}</div>
      <div class="detail-info">
        <div class="detail-name">${a.name}</div>
        <div class="detail-sub">${a.nationality} · ${a.birth}${a.death?'–'+a.death:' – vivente'} · ${a.movement}</div>
        <div class="detail-badges">
          ${a.alive?'<span class="hero-badge hb-src">Vivente</span>':''}
          <span class="hero-badge hb-ver">${a.period}</span>
          <span class="ac-cat cat-${a.category}" style="font-size:11px;padding:4px 10px;border-radius:20px;">${a.category==='bluechip'?'Blue Chip':a.category==='italiani'?'Italiano':a.category}</span>
        </div>
      </div>
      <div class="detail-score">
        <div class="detail-pts">${fmtPts(sc.total)}</div>
        <div class="detail-stars">${stars(sc.total)}</div>
        <div class="detail-cluster"><span class="ac-cat ${cl.cls}">${cl.label}</span></div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem;">

      <div class="section-card">
        <div class="sc-title">🏛️ Musei Tier A</div>
        <div class="tier-list">${tierList(a.museumA,'A')}</div>
        ${a.museumB&&a.museumB.length?`<div class="sc-title" style="margin-top:12px;">Tier B</div><div class="tier-list">${tierList(a.museumB,'B')}</div>`:''}
        ${a.museumC&&a.museumC.length?`<div class="sc-title" style="margin-top:12px;">Tier C</div><div class="tier-list">${tierList(a.museumC,'C')}</div>`:''}
        <div style="text-align:right;font-size:12px;font-weight:600;color:var(--gold);margin-top:8px;">Subtotale: +${fmtPts(sc.museumPts)} pt</div>
      </div>

      <div class="section-card">
        <div class="sc-title">🖼️ Gallerie</div>
        <div class="tier-list">${[...((a.galleryA||[]).map(n=>({n,t:'A'}))),(... (a.galleryB||[]).map(n=>({n,t:'B'}))),... (a.galleryC||[]).map(n=>({n,t:'C'}))].map(x=>`<div class="tier-item"><span class="tier-name">${x.n}</span><span class="tier-badge ${x.t.toLowerCase()}">Tier ${x.t}</span></div>`).join('')||'<span style="font-size:12px;color:var(--textm)">Nessuna</span>'}</div>
        <div class="sc-title" style="margin-top:12px;">🏆 Premi e fiere</div>
        <div class="tier-list">${[...(a.prizeA||[]).map(n=>({n,t:'A'})),...(a.prizeB||[]).map(n=>({n,t:'B'})),...(a.fairA||[]).map(n=>({n,t:'A'})),...(a.fairB||[]).map(n=>({n,t:'B'}))].map(x=>`<div class="tier-item"><span class="tier-name">${x.n}</span><span class="tier-badge ${x.t.toLowerCase()}">Tier ${x.t}</span></div>`).join('')||'<span style="font-size:12px;color:var(--textm)">Nessuno</span>'}</div>
        <div style="text-align:right;font-size:12px;font-weight:600;color:var(--gold);margin-top:8px;">Subtotale: +${fmtPts(sc.galleryPts+sc.prizePts+sc.fairPts)} pt</div>
      </div>

    </div>

    <div class="section-card">
      <div class="sc-title">📈 Fatturato aste — fonte Artprice</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem;">
        <div class="metric-tile"><div class="mt-lbl">Fatturato 2025</div><div class="mt-val">${fmtM(a.auction1)}</div></div>
        <div class="metric-tile"><div class="mt-lbl">Fatturato 3 anni</div><div class="mt-val">${fmtM(a.auction3)}</div></div>
        <div class="metric-tile"><div class="mt-lbl">Record storico</div><div class="mt-val">${fmtM(a.auctionRecord)}</div></div>
        <div class="metric-tile"><div class="mt-lbl">Anno record</div><div class="mt-val">${a.auctionRecordYear}</div></div>
      </div>
      <div class="chart-wrap"><canvas id="auction-chart"></canvas></div>
      <div class="source-row">
        <span class="source-lbl">Fonte:</span>
        <span class="source-badge">📊 ${a.artpriceSource||'Artprice.com'}</span>
      </div>
    </div>

    <div class="section-card">
      <div class="sc-title">📁 Qualità documentale</div>
      <div class="metrics-grid">
        <div class="metric-tile"><div class="mt-lbl">Catalogue raisonné</div><div class="mt-val">${badgeSi(a.cr)}</div></div>
        <div class="metric-tile"><div class="mt-lbl">Fondazione/Archivio</div><div class="mt-val">${badgeSi(a.found)}</div></div>
        <div class="metric-tile"><div class="mt-lbl">Curatori rif.</div><div class="mt-val">${curLabel(a.cur)}</div></div>
        <div class="metric-tile"><div class="mt-lbl">Caposcuola</div><div class="mt-val">${badgeSi(a.leader)}</div></div>
        <div class="metric-tile"><div class="mt-lbl">Coll. private</div><div class="mt-val">${badgeSi(a.privColl)}</div></div>
        <div class="metric-tile"><div class="mt-lbl">Falsi riscontrati</div><div class="mt-val" style="color:${(a.fakes||0)>0?'var(--err)':'inherit'}">${a.fakes||0}</div></div>
        <div class="metric-tile"><div class="mt-lbl">Mostre personali</div><div class="mt-val">${a.solo||0}</div></div>
        <div class="metric-tile"><div class="mt-lbl">Monografie</div><div class="mt-val">${a.mono||0}</div></div>
      </div>
    </div>

    <div class="section-card">
      <div class="sc-title">📊 Punteggi per categoria</div>
      <div class="score-bars">${barsHtml}</div>
      <div style="text-align:right;font-size:14px;font-weight:700;color:var(--gold);margin-top:12px;padding-top:8px;border-top:.5px solid var(--bd);">
        Totale: ${fmtPts(sc.total)} pt &nbsp; ${stars(sc.total)}
      </div>
    </div>

    ${a.aiComment?`<div class="ai-box"><div class="ai-title">🤖 Sintesi</div><div class="ai-text">${a.aiComment}</div></div>`:''}

    <div style="display:flex;gap:8px;margin-top:1.5rem;">
      <button onclick="window.print()" style="padding:9px 18px;font-size:13px;border:.5px solid var(--bd-s);border-radius:var(--r);background:var(--surf);color:var(--text);cursor:pointer;font-family:inherit;">🖨️ Stampa / PDF</button>
      <a href="confronta.html?a=${a.id}" style="padding:9px 18px;font-size:13px;border:.5px solid var(--bd-s);border-radius:var(--r);background:var(--surf);color:var(--text);cursor:pointer;font-family:inherit;text-decoration:none;">⚖️ Confronta con altri</a>
    </div>
  `;

  // Chart
  if(a.auctionHistory && a.auctionYears) {
    const ctx = document.getElementById('auction-chart').getContext('2d');
    if(chartInstance) chartInstance.destroy();
    chartInstance = new Chart(ctx,{
      type:'bar',
      data:{
        labels: a.auctionYears,
        datasets:[{
          label:'Fatturato aste (M€)',
          data: a.auctionHistory,
          backgroundColor:'rgba(184,134,11,0.25)',
          borderColor:'rgba(184,134,11,0.8)',
          borderWidth:1,
          borderRadius:2,
        }]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>'€'+ctx.raw+'M'}}},
        scales:{
          x:{grid:{display:false},ticks:{font:{size:10},maxRotation:45}},
          y:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{font:{size:10},callback:v=>'€'+v+'M'}}
        }
      }
    });
  }
}

function initSearch(artists) {
  const allR = artists.map(a=>({...a,...calcRating(a)}));
  const inp = document.getElementById('nav-search-input');
  const dd  = document.getElementById('search-dropdown');
  inp.addEventListener('input',()=>{
    const q = inp.value.toLowerCase().trim();
    if(!q){dd.classList.remove('open');return;}
    const res = allR.filter(a=>a.name.toLowerCase().includes(q)).slice(0,6);
    if(!res.length){dd.classList.remove('open');return;}
    const avColors={bluechip:'av-gold',italiani:'av-blue',emergenti:'av-green'};
    dd.innerHTML = res.map(a=>`
      <a class="search-item" href="artist.html?id=${a.id}">
        <div class="search-av ${avColors[a.category]||'av-gray'}">${a.avatar.replace('2','')}</div>
        <div><div class="search-name">${a.name}</div><div class="search-meta">${a.movement}</div></div>
        <div class="search-score">${fmtPts(a.total)}</div>
      </a>`).join('');
    dd.classList.add('open');
  });
  document.addEventListener('click',e=>{if(!e.target.closest('.nav-search-wrap'))dd.classList.remove('open');});
}
</script>
</body>
</html>
